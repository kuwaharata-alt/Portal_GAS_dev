<section id="panel-list" class="panel">
  <div class="filter-bar">
    <!-- ステータス -->
    <div class="filter-item">
      <div class="filter-label">ステータス</div>
      <div class="dd filter-dd" id="statusDD">
        <button
          type="button"
          class="dd-btn filter-control"
          id="statusBtn"
          onclick="toggleStatusDD_(event)"
        >
          すべて
        </button>
        <div class="dd-menu" id="statusMenu"></div>
      </div>
    </div>

    <!-- カテゴリー -->
    <div class="filter-item">
      <label class="filter-label">ｶﾃｺﾞﾘｰ</label>
      <select id="categoryFilter" class="filter-control" onchange="onListFilterChanged_()">
        <option value="">すべて</option>
      </select>
    </div>

    <!-- 担当者（カスタムDDそのまま流用） -->
    <div class="filter-item">
      <label class="filter-label">担当者</label>
      <div class="dd filter-dd" id="memberDD">
        <button
          type="button"
          class="dd-btn filter-control"
          id="memberBtn"
          onclick="toggleMemberDD_(event)"
        >
          すべて
        </button>
        <div class="dd-menu" id="memberMenu"></div>
      </div>
    </div>

    <!-- 完了予定月 -->
    <div class="filter-item">
      <label class="filter-label">完了予定月</label>
      <input type="month" id="planMonth" class="filter-control" onchange="onListFilterChanged_()" />
    </div>

    <div class="panel-toolbar-right">
      <input
        id="q"
        type="search"
        placeholder="検索（見積番号 / 顧客名 / 案件概要 など）"
        style="min-width: 320px"
        onkeydown="if(event.key==='Enter'){ loadCases_(); }"
      />
      <button class="primary" type="button" onclick="loadCases_()">検索</button>
      <button type="button" onclick="reloadList_()">更新</button>
    </div>
  </div>

  <div class="card table-card">
    <div class="table-shell list-table-shell">
      <table id="tbl" class="list-table">
        <colgroup>
          <col style="width: 5%" />
          <col style="width: 10%" />
          <col style="width: 15%" />
          <col style="width: 15%" />
          <col style="width: 15%" />
          <col style="width: 20%" />
          <col style="width: 25%" />
        </colgroup>
        <thead>
          <tr id="thead"></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="footer">
      <div class="small" id="count"></div>
    </div>
  </div>
</section>
