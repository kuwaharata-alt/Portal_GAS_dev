<style>

    min-width: 160px;
    height: 36px;

    background: #fff;
    border-radius: 10px;
    text-align: left;
    cursor: pointer;
  }
  .dd.is-open .dd-menu {
    display: block;
  }
  .dd-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 8px;
    cursor: pointer;
  }
  .dd-item:hover {
    background: #f8fafc;
  }

    max-height: 80vh;

  }

    border-spacing: 0;
    table-layout: fixed;
    font-size: 13px;
  }
  .list-table th,
  .list-table td {
    box-sizing: border-box;
    border-right: 1px solid #d6dee8;
    border-bottom: 1px solid #d6dee8;
    padding: 10px 12px;
    background: #fff;
    vertical-align: middle;
  }
  .list-table thead th {
    position: sticky;
    top: 0;
    z-index: 20;
    background: #c8d8e6;
    color: #111827;
    text-align: center;
    font-weight: 700;
  }
  .list-table tbody tr:hover td {
    background: #f8fbff;
  }

  /* ===== 自身ハイライト ===== */
  .list-table tbody tr.is-mine td {
    background: #f0f9ff;
  }
  .list-table tbody tr.is-mine:hover td {
    background: #e0f2fe;
  }
  .list-table tbody tr.is-mine td:first-child {
    box-shadow: inset 4px 0 0 #2563eb;
  }

  th.col-act,

  .list-act-btn {
    display: block;

    padding: 8px 0;
    border: 1px solid #cfd8e3;

    background: #fff;
    font-size: 12px;
  }
  .list-act-btn + .list-act-btn {
    margin-top: 10px;
  }

  .td-case-summary {
    min-width: 280px;

    color: #1d4ed8;
    border: 1px solid #bfdbfe;
    font-size: 11px;
    font-weight: 700;
    line-height: 1.2;

  .se-tag {

    color: #047857;
    border-color: #a7f3d0;

    word-break: break-word;

  }

    display: flex;
    flex-direction: column;
    gap: 6px;

    display: grid;
    grid-template-columns: 36px 1fr;
    align-items: stretch;
    border: 1px solid #cfd8e3;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    min-height: 40px;

  .filter-label {
    font-size: 12px;
    font-weight: 700;
    color: #374151;
    padding-left: 2px;
  }
  .filter-control {
    height: 38px;
    padding: 0 14px;
    border: 1px solid #cbd5e1;
    border-radius: 12px;
    background: #f8fafc;
    font-size: 14px;
    color: #111827;
    outline: none;
    box-sizing: border-box;
  }
  .filter-control:focus {
    background: #fff;
    border-color: #94a3b8;
  }
  .filter-dd {
    position: relative;
  }
  .dd-btn.filter-control {
    width: 100%;
    text-align: center;
    cursor: pointer;
  }
  .dd-menu {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    min-width: 100%;
    max-height: 320px;
    overflow: auto;
    background: #fff;
    border: 1px solid #cbd5e1;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    padding: 6px;
    z-index: 100;
    display: none;
  }
  .dd-menu label,
  .dd-menu button {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  .dd-menu label:hover {
    background: #f1f5f9;
  }

    vertical-align: middle;

    width: 100%;

  .status-main {

    justify-content: center;

  }
  .status-kind {
    font-size: 11px;
    font-weight: 700;

  .status-chip {

    line-height: 1.25;
    white-space: pre-line;
    border: 1px solid rgba(0, 0, 0, 0.08);
